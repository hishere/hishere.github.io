<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>soc排行</title>
    <script src="https://unpkg.zhimg.com/vue/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.zhimg.com/axios/dist/axios.min.js"></script>
    <style>
        th,td{
            width: 6rem;
            text-align: left;
        }
    </style>
</head>
<body>
<div id="app">
    <table>
        <tr>
            <th>型号</th>
            <th>cpu</th>
            <th>电池</th>
            <th>价格</th>
            <th>内存</th>
            <th>发布日</th>
            <th>屏幕</th>
            <th>系统</th>
        </tr>
        <tr v-for="p in prods">
            <td>{{p[0]}}</td>
            <td>{{p[1]}}</td>
            <td>{{p[2]}}</td>
            <td>{{p[3]}}</td>
            <td>{{p[4]}}</td>
            <td>{{p[5]}}</td>
            <td>{{p[6]}}</td>
            <td>{{p[7]}}</td>
        </tr>

    </table>
</div>
<script>
    const app = {
        data() {
            return {
                prods: [
                    ["moto g55", "天玑7025", "5000", "920", "8+128", "2024年10", "LCD", "14"]
                ]
            }
        }
    };
    const vue = Vue.createApp(app);
    vue.mount("#app")
</script>

</body>
</html>
