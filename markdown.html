<!DOCTYPE html>
<html lang="zh_CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script src="https://s4.zstatic.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>


    <script src="https://s4.zstatic.net/npm/markdown-it/dist/markdown-it.min.js"></script>
	<script src="https://s4.zstatic.net/npm/markdown-it-anchor/dist/markdownItAnchor.umd.js"></script>
    <script src="https://s4.zstatic.net/npm/markdown-it-toc-done-right/dist/markdownItTocDoneRight.umd.js"></script>
	<style>
        #toc {
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #f9f9f9;
        }

        #markdown-rendered {
            margin-top: 20px;
        }
        #backToTop {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 30px;
            z-index: 99;
            border: none;
            outline: none;
            background-color: #007BFF;
            opacity: 0.2;
            color: white;
            cursor: pointer;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
        }

        #backToTop:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div id="markdown-rendered"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mdLoad = urlParams.get('md');
        console.log('接收到的 md 参数值为：', mdLoad);
        document.title=mdLoad;
    
        const md = window.markdownit({
            html: true,
            linkify: true,
            typographer: true
        });
        md.use(window.markdownItAnchor, { permalink: true, permalinkBefore: true, permalinkSymbol: '§' })
           .use(window.markdownItTocDoneRight,{containerId: 'toc'}); 
        

        // 重写代码块渲染方法
        // md.renderer.rules.fence = function (tokens, idx, options, env, self) {
            // const token = tokens[idx];
            // const info = token.info? token.info.trim() : '';
            // const lang = window.hljs.getLanguage(info)? info : 'plaintext';
            // const code = token.content;
            // const highlighted = window.hljs.highlight(code, { language: lang }).value;
            // return `<pre><code class="hljs ${lang}">${highlighted}</code></pre>`;
        // };
        
        const externalMdUrl = './md/'+mdLoad+'.md';

        fetch(externalMdUrl)
         .then(response => response.text())
         .then(data => {
                const html=md.render('${toc}\n'+data);
                document.getElementById('markdown-rendered').innerHTML = html;
            })
         .catch(error => {
                console.error('Error fetching Markdown file:', error);
            });
    </script>
    <button id="backToTop" onclick="scrollToTop()">顶</button>
    <script>
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior:'smooth'
            });
        }
        window.onscroll = function () {
            const backToTopButton = document.getElementById('backToTop');
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                backToTopButton.style.display = 'block';
            } else {
                backToTopButton.style.display = 'none';
            }
        };
    </script>
</body>
</html>
